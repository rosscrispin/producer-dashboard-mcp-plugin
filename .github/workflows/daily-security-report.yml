name: Daily Security Report

on:
  schedule:
    # 06:30 Australia/Brisbane. GitHub schedules are UTC.
    - cron: '30 20 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: security-report-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REPORT_DIR: security-reports
  RUN_APP_SECURITY_REGRESSIONS: ${{ vars.RUN_APP_SECURITY_REGRESSIONS }}
  UPLOAD_FULL_SECURITY_ARTIFACTS: ${{ vars.UPLOAD_FULL_SECURITY_ARTIFACTS }}

jobs:
  security-report:
    name: Dependency, secret, and rule scans
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize report
        shell: bash
        run: |
          mkdir -p "$REPORT_DIR"
          {
            echo "# Daily Security Report"
            echo ""
            echo "- Repository: $GITHUB_REPOSITORY"
            echo "- Ref: $GITHUB_REF"
            echo "- SHA: $GITHUB_SHA"
            echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo ""
          } > "$REPORT_DIR/summary.md"
          find . -path './.git' -prune -o -type f -print | sort > "$REPORT_DIR/workspace-files.txt"

      - name: Set up Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Scan JavaScript dependencies
        if: ${{ hashFiles('package.json') != '' }}
        shell: bash
        run: |
          set +e
          echo "## JavaScript dependency audit" >> "$REPORT_DIR/summary.md"
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
            install_status=$?
            echo "$install_status" > "$REPORT_DIR/npm-install.exit"
            if [ "$install_status" -eq 0 ]; then
              npm audit --omit=dev --json > "$REPORT_DIR/npm-audit.json"
              echo "$?" > "$REPORT_DIR/npm-audit.exit"
            else
              echo '{"error":"npm ci failed"}' > "$REPORT_DIR/npm-audit.json"
            fi
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable || true
            pnpm install --frozen-lockfile --ignore-scripts
            install_status=$?
            echo "$install_status" > "$REPORT_DIR/pnpm-install.exit"
            if [ "$install_status" -eq 0 ]; then
              pnpm audit --prod --json > "$REPORT_DIR/pnpm-audit.json"
              echo "$?" > "$REPORT_DIR/pnpm-audit.exit"
            else
              echo '{"error":"pnpm install failed"}' > "$REPORT_DIR/pnpm-audit.json"
            fi
          elif [ -f yarn.lock ]; then
            corepack enable || true
            yarn install --immutable
            install_status=$?
            echo "$install_status" > "$REPORT_DIR/yarn-install.exit"
            if [ "$install_status" -eq 0 ]; then
              yarn npm audit --environment production --json > "$REPORT_DIR/yarn-audit.json"
              echo "$?" > "$REPORT_DIR/yarn-audit.exit"
            else
              echo '{"error":"yarn install failed"}' > "$REPORT_DIR/yarn-audit.json"
            fi
          else
            echo "No supported JavaScript lockfile found; dependency audit skipped." > "$REPORT_DIR/js-audit-skipped.txt"
          fi
          exit 0

      - name: Set up Python
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scan Python dependencies
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml') != '' }}
        shell: bash
        run: |
          set +e
          python -m pip install --upgrade pip pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt -f json -o "$REPORT_DIR/pip-audit-requirements.json"
            echo "$?" > "$REPORT_DIR/pip-audit-requirements.exit"
          fi
          if [ -f pyproject.toml ]; then
            pip-audit -f json -o "$REPORT_DIR/pip-audit-pyproject.json"
            echo "$?" > "$REPORT_DIR/pip-audit-pyproject.exit"
          fi
          exit 0

      - name: Set up Go
        if: ${{ hashFiles('go.mod') != '' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Scan Go vulnerabilities
        if: ${{ hashFiles('go.mod') != '' }}
        shell: bash
        run: |
          set +e
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -json ./... > "$REPORT_DIR/govulncheck.json"
          echo "$?" > "$REPORT_DIR/govulncheck.exit"
          exit 0

      - name: Run Semgrep security rules
        shell: bash
        run: |
          set +e
          python3 -m pip install --upgrade semgrep
          semgrep scan --config p/ci --json --output "$REPORT_DIR/semgrep.json" .
          echo "$?" > "$REPORT_DIR/semgrep.exit"
          exit 0

      - name: Set up Go for Gitleaks
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.22.0'
          check-latest: true
          cache: false

      - name: Run Gitleaks secret scan
        shell: bash
        run: |
          set +e
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          install_status=$?
          echo "$install_status" > "$REPORT_DIR/gitleaks-install.exit"
          gitleaks_bin="$(go env GOPATH)/bin/gitleaks"
          if [ "$install_status" -ne 0 ]; then
            echo '{"error":"gitleaks install failed"}' > "$REPORT_DIR/gitleaks.json"
            echo "not-run" > "$REPORT_DIR/gitleaks.exit"
            exit 0
          fi
          if [ ! -x "$gitleaks_bin" ]; then
            echo "gitleaks binary not found" > "$REPORT_DIR/gitleaks-error.txt"
            echo '{"error":"gitleaks binary not found"}' > "$REPORT_DIR/gitleaks.json"
            echo "127" > "$REPORT_DIR/gitleaks.exit"
            exit 0
          fi
          scan_dir="$(mktemp -d)"
          git archive --format=tar HEAD | tar -x -C "$scan_dir"
          "$gitleaks_bin" detect --no-git --source "$scan_dir" --report-format json --report-path "$REPORT_DIR/gitleaks.json" --redact --no-banner
          status=$?
          echo "$status" > "$REPORT_DIR/gitleaks.exit"
          if [ ! -f "$REPORT_DIR/gitleaks.json" ]; then
            echo '[]' > "$REPORT_DIR/gitleaks.json"
          fi
          "$gitleaks_bin" detect --source "$GITHUB_WORKSPACE" --report-format json --report-path "$REPORT_DIR/gitleaks-history.json" --redact --no-banner
          history_status=$?
          echo "$history_status" > "$REPORT_DIR/gitleaks-history.exit"
          if [ ! -f "$REPORT_DIR/gitleaks-history.json" ]; then
            echo '[]' > "$REPORT_DIR/gitleaks-history.json"
          fi
          exit 0

      - name: Optional app security regression suite
        if: ${{ env.RUN_APP_SECURITY_REGRESSIONS == 'true' && hashFiles('package.json') != '' }}
        shell: bash
        run: |
          set +e
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['test:sharing:security'] ? 0 : 1)"; then
            npm run test:sharing:security > "$REPORT_DIR/app-security-regression.log" 2>&1
            echo "$?" > "$REPORT_DIR/app-security-regression.exit"
          else
            echo "No test:sharing:security script found." > "$REPORT_DIR/app-security-regression-skipped.txt"
          fi
          exit 0

      - name: Summarize report
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const reportDir = process.env.REPORT_DIR || 'security-reports';
          const out = [];
          let failedScan = false;
          const readJsonPath = (file) => {
            try { return JSON.parse(fs.readFileSync(file, 'utf8')); }
            catch { return null; }
          };
          const readJson = (name) => readJsonPath(reportDir + '/' + name);
          const readExitPath = (file) => {
            try { return fs.readFileSync(file, 'utf8').trim(); }
            catch { return 'not-run'; }
          };
          const readExit = (name) => readExitPath(reportDir + '/' + name);
          const summarizeJsAudit = (label, dir) => {
            const npmAudit = readJsonPath(dir + '/npm-audit.json');
            const pnpmAudit = readJsonPath(dir + '/pnpm-audit.json');
            const yarnAudit = readJsonPath(dir + '/yarn-audit.json');
            const coverageGap = fs.existsSync(dir + '/coverage-gap.txt') ? fs.readFileSync(dir + '/coverage-gap.txt', 'utf8').trim() : null;
            if (coverageGap) {
              failedScan = true;
              out.push('- ' + label + ': dependency audit coverage gap: ' + coverageGap);
              return;
            }
            const audit = npmAudit || pnpmAudit || yarnAudit;
            const auditName = npmAudit ? 'npm audit' : pnpmAudit ? 'pnpm audit' : yarnAudit ? 'yarn audit' : 'JavaScript dependency audit';
            const installExit = readExitPath(dir + '/npm-install.exit') !== 'not-run' ? readExitPath(dir + '/npm-install.exit')
              : readExitPath(dir + '/pnpm-install.exit') !== 'not-run' ? readExitPath(dir + '/pnpm-install.exit')
              : readExitPath(dir + '/yarn-install.exit');
            const auditExit = readExitPath(dir + '/npm-audit.exit') !== 'not-run' ? readExitPath(dir + '/npm-audit.exit')
              : readExitPath(dir + '/pnpm-audit.exit') !== 'not-run' ? readExitPath(dir + '/pnpm-audit.exit')
              : readExitPath(dir + '/yarn-audit.exit');
            if (installExit !== 'not-run' && installExit !== '0') {
              failedScan = true;
              out.push('- ' + label + ': ' + auditName + ' install failed with exit ' + installExit);
              return;
            }
            if (audit?.metadata?.vulnerabilities) {
              const v = audit.metadata.vulnerabilities;
              out.push('- ' + label + ': ' + auditName + ': critical ' + (v.critical || 0) + ', high ' + (v.high || 0) + ', moderate ' + (v.moderate || 0) + ', low ' + (v.low || 0));
              return;
            }
            if (audit) {
              out.push('- ' + label + ': ' + auditName + ': see artifact (exit ' + auditExit + ')');
              return;
            }
            if (fs.existsSync(dir + '/js-audit-skipped.txt')) {
              out.push('- ' + label + ': JavaScript dependency audit skipped; no supported lockfile');
              return;
            }
            out.push('- ' + label + ': JavaScript dependency audit not run');
          };

          out.push('## Scan Summary');
          const packageRoot = reportDir + '/packages';
          if (fs.existsSync(packageRoot)) {
            for (const entry of fs.readdirSync(packageRoot).sort()) {
              const dir = packageRoot + '/' + entry;
              if (!fs.statSync(dir).isDirectory()) continue;
              const packageDir = fs.existsSync(dir + '/package-dir.txt') ? fs.readFileSync(dir + '/package-dir.txt', 'utf8').trim() : entry;
              summarizeJsAudit(packageDir, dir);
            }
          } else {
            summarizeJsAudit('root', reportDir);
          }
          for (const name of ['pip-audit-requirements.json', 'pip-audit-pyproject.json']) {
            const audit = readJson(name);
            if (audit) {
              const count = Array.isArray(audit.dependencies)
                ? audit.dependencies.reduce((sum, dep) => sum + ((dep.vulns || []).length), 0)
                : 'see artifact';
              out.push('- ' + name.replace('.json', '') + ': ' + count + ' finding(s)');
            }
          }
          if (fs.existsSync(reportDir + '/govulncheck.json')) {
            const content = fs.readFileSync(reportDir + '/govulncheck.json', 'utf8');
            const findings = content.split('\n').filter(line => line.includes('"finding"') || line.includes('"osv"')).length;
            out.push('- govulncheck: ' + findings + ' finding event(s), exit ' + readExit('govulncheck.exit'));
          }
          const semgrep = readJson('semgrep.json');
          if (semgrep?.results) {
            out.push('- Semgrep: ' + semgrep.results.length + ' finding(s)');
          } else {
            out.push('- Semgrep: see artifact/logs (exit ' + readExit('semgrep.exit') + ')');
          }
          const gitleaks = readJson('gitleaks.json');
          const gitleaksInstallExit = readExit('gitleaks-install.exit');
          const gitleaksExit = readExit('gitleaks.exit');
          if (gitleaksInstallExit !== '0') {
            failedScan = true;
            out.push('- Gitleaks: failed to install (exit ' + gitleaksInstallExit + '); secret scan did not run');
          } else if (gitleaksExit === '0') {
            out.push('- Gitleaks: ' + (Array.isArray(gitleaks) ? gitleaks.length : 0) + ' finding(s)');
          } else if (gitleaksExit === '1' && Array.isArray(gitleaks)) {
            out.push('- Gitleaks: ' + gitleaks.length + ' finding(s); see artifact');
          } else {
            failedScan = true;
            out.push('- Gitleaks: scan failed (exit ' + gitleaksExit + '); leaked-secret status is inconclusive');
          }
          const gitleaksHistory = readJson('gitleaks-history.json');
          const gitleaksHistoryExit = readExit('gitleaks-history.exit');
          if (gitleaksInstallExit === '0') {
            if (gitleaksHistoryExit === '0') {
              out.push('- Gitleaks git history: ' + (Array.isArray(gitleaksHistory) ? gitleaksHistory.length : 0) + ' finding(s)');
            } else if (gitleaksHistoryExit === '1' && Array.isArray(gitleaksHistory)) {
              out.push('- Gitleaks git history: ' + gitleaksHistory.length + ' finding(s); see artifact');
            } else {
              failedScan = true;
              out.push('- Gitleaks git history: scan failed (exit ' + gitleaksHistoryExit + '); historical leaked-secret status is inconclusive');
            }
          }
          if (fs.existsSync(reportDir + '/app-security-regression.exit')) {
            out.push('- App security regression suite: exit ' + readExit('app-security-regression.exit'));
          } else if (process.env.RUN_APP_SECURITY_REGRESSIONS === 'true') {
            out.push('- App security regression suite: skipped; no matching script');
          } else {
            out.push('- App security regression suite: disabled; set repository variable RUN_APP_SECURITY_REGRESSIONS=true to enable');
          }
          out.push('- CodeQL: see the separate CodeQL job and GitHub code-scanning results when available');
          out.push('');
          out.push('Artifacts in this run contain compact JSON/status output by default. Set UPLOAD_FULL_SECURITY_ARTIFACTS=true to include raw logs.');
          fs.appendFileSync(reportDir + '/summary.md', out.join('\n') + '\n');
          if (failedScan) {
            fs.writeFileSync(reportDir + '/security-report.failed', 'One or more security scanners failed or coverage gaps were detected.\n');
          }
          NODE
          cat "$REPORT_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$REPORT_DIR/security-report.failed" ]; then
            exit 1
          fi

      - name: Prepare compact security report artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          upload_dir="security-report-upload"
          rm -rf "$upload_dir"
          mkdir -p "$upload_dir"
          if [ "${UPLOAD_FULL_SECURITY_ARTIFACTS:-}" = "true" ]; then
            cp -R "$REPORT_DIR"/. "$upload_dir"/
          else
            find "$REPORT_DIR" -maxdepth 1 -type f \( \
              -name '*.json' -o \
              -name '*.exit' -o \
              -name '*.status' -o \
              -name '*.reason' -o \
              -name '*.md' -o \
              -name '*.failed' -o \
              -name '*-error.txt' \
            \) -exec cp {} "$upload_dir"/ \;
          fi

      - name: Upload security report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-report-${{ github.event.repository.name }}-${{ github.run_id }}
          path: security-report-upload/
          if-no-files-found: warn
          retention-days: 2

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
          - go

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect language sources
        id: detect
        shell: bash
        run: |
          case "${{ matrix.language }}" in
            javascript-typescript)
              if git ls-files '*.js' '*.jsx' '*.ts' '*.tsx' | grep -q .; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
              ;;
            python)
              if git ls-files '*.py' | grep -q .; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
              ;;
            go)
              if git ls-files '*.go' | grep -q .; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
              ;;
          esac

      - name: Initialize CodeQL
        if: steps.detect.outputs.present == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        if: steps.detect.outputs.present == 'true'
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: Analyze
        if: steps.detect.outputs.present == 'true'
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
